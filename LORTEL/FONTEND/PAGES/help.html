<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ giúp - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <h1 class="text-2xl font-bold text-gray-800">Trung tâm trợ giúp</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm text-center"><div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-book text-blue-600 text-2xl"></i></div><h3 class="font-bold mt-3">Hướng dẫn sử dụng</h3><p class="text-sm text-gray-500">Tìm hiểu cách sử dụng hệ thống</p></div>
            <div class="bg-white p-6 rounded-xl shadow-sm text-center"><div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-question-circle text-green-600 text-2xl"></i></div><h3 class="font-bold mt-3">Câu hỏi thường gặp</h3><p class="text-sm text-gray-500">Giải đáp các thắc mắc phổ biến</p></div>
            <div class="bg-white p-6 rounded-xl shadow-sm text-center"><div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-headset text-purple-600 text-2xl"></i></div><h3 class="font-bold mt-3">Hỗ trợ kỹ thuật</h3><p class="text-sm text-gray-500">Liên hệ đội ngũ hỗ trợ</p></div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border p-6">
            <h3 class="font-bold text-lg mb-4">Câu hỏi thường gặp</h3>
            <div class="space-y-3"><div class="border rounded-lg p-4"><button class="w-full text-left font-medium">Làm thế nào để tạo đặt phòng mới?</button></div></div>
        </div>
    </div>
</body>
</html>
