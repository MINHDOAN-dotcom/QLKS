<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin nhắn - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 h-screen">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Tin nhắn</h1>
        
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden h-[calc(100vh-120px)]">
            <div class="grid grid-cols-3 h-full">
                <div class="border-r">
                    <div class="p-4 border-b"><input type="text" placeholder="Tìm kiếm..." class="w-full border rounded-lg px-4 py-2 text-sm"></div>
                    <div class="overflow-y-auto h-full">
                        <div class="p-4 hover:bg-gray-50 cursor-pointer border-b"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center">NA</div><div><p class="font-medium">Nguyễn Văn A</p><p class="text-xs text-gray-500">Xin chào, tôi muốn hỏi...</p></div></div></div>
                    </div>
                </div>
                <div class="col-span-2 flex flex-col">
                    <div class="p-4 border-b"><h3 class="font-bold">Nguyễn Văn A</h3></div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-4">
                        <div class="flex justify-start"><div class="bg-gray-100 p-3 rounded-lg max-w-md">Xin chào, tôi muốn hỏi về phòng Deluxe</div></div>
                        <div class="flex justify-end"><div class="bg-emerald-600 text-white p-3 rounded-lg max-w-md">Dạ vâng, anh/chị cần tư vấn gì ạ?</div></div>
                    </div>
                    <div class="p-4 border-t flex gap-2"><input type="text" placeholder="Nhập tin nhắn..." class="flex-1 border rounded-lg px-4 py-2"><button class="bg-emerald-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
