<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đặt phòng - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-confirmed { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fed7aa; color: #92400e; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
        .status-completed { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Quản lý đặt phòng</h1>
                <p class="text-sm text-gray-500 mt-1">Quản lý tất cả đặt phòng của khách sạn</p>
            </div>
            <button class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-emerald-700" onclick="openBookingModal()">
                <i class="fas fa-plus mr-2"></i>Tạo đặt phòng
            </button>
        </div>
        
        <!-- Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <input type="text" id="searchInput" placeholder="Tìm theo mã, tên khách..." class="border rounded-lg px-4 py-2 text-sm">
                <select id="statusFilter" class="border rounded-lg px-4 py-2 text-sm">
                    <option value="all">Tất cả trạng thái</option>
                    <option value="confirmed">Đã xác nhận</option>
                    <option value="pending">Chờ xác nhận</option>
                    <option value="cancelled">Đã hủy</option>
                    <option value="completed">Hoàn thành</option>
                </select>
                <input type="date" id="dateFrom" class="border rounded-lg px-4 py-2 text-sm" placeholder="Từ ngày">
                <input type="date" id="dateTo" class="border rounded-lg px-4 py-2 text-sm" placeholder="Đến ngày">
                <button onclick="filterBookings()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">
                    <i class="fas fa-search mr-1"></i>Tìm kiếm
                </button>
            </div>
        </div>
        
        <!-- Bookings Table -->
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Mã đặt</th>
                            <th class="px-6 py-3 text-left">Khách hàng</th>
                            <th class="px-6 py-3 text-left">Phòng</th>
                            <th class="px-6 py-3 text-left">Nhận phòng</th>
                            <th class="px-6 py-3 text-left">Trả phòng</th>
                            <th class="px-6 py-3 text-left">Trạng thái</th>
                            <th class="px-6 py-3 text-right">Tổng tiền</th>
                            <th class="px-6 py-3 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y" id="bookingsTableBody">
                        <!-- Dynamic data will be loaded here -->
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t flex justify-between items-center">
                <p class="text-sm text-gray-500" id="paginationInfo">Hiển thị 1-5 của 12 kết quả</p>
                <div class="flex gap-2" id="paginationControls"></div>
            </div>
        </div>
    </div>
    
    <!-- Booking Modal -->
    <div id="bookingModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Tạo đặt phòng mới</h2>
                <button onclick="closeBookingModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-2">Khách hàng</label><input type="text" id="customerName" class="w-full border rounded-lg px-4 py-2" placeholder="Tên khách hàng"></div>
                    <div><label class="block text-sm font-medium mb-2">Email</label><input type="email" id="customerEmail" class="w-full border rounded-lg px-4 py-2" placeholder="email@example.com"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-2">Số điện thoại</label><input type="tel" id="customerPhone" class="w-full border rounded-lg px-4 py-2" placeholder="0901 234 567"></div>
                    <div><label class="block text-sm font-medium mb-2">Phòng</label><select id="roomSelect" class="w-full border rounded-lg px-4 py-2"><option value="">Chọn phòng</option><option value="Deluxe">Deluxe - 1.200.000đ</option><option value="Standard">Standard - 850.000đ</option><option value="Suite">Suite - 2.200.000đ</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-2">Nhận phòng</label><input type="date" id="checkin" class="w-full border rounded-lg px-4 py-2"></div>
                    <div><label class="block text-sm font-medium mb-2">Trả phòng</label><input type="date" id="checkout" class="w-full border rounded-lg px-4 py-2"></div>
                </div>
                <div><label class="block text-sm font-medium mb-2">Ghi chú</label><textarea rows="2" class="w-full border rounded-lg px-4 py-2" placeholder="Yêu cầu đặc biệt..."></textarea></div>
            </div>
            <div class="p-6 border-t flex justify-end gap-3">
                <button onclick="closeBookingModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Hủy</button>
                <button onclick="saveBooking()" class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Lưu đặt phòng</button>
            </div>
        </div>
    </div>
    
    <script>
        // Mock data
        let bookings = [
            { id: '#BK-001', customer: 'Nguyễn Văn A', email: 'a@gmail.com', phone: '0901...', room: 'Deluxe', checkin: '15/03/2026', checkout: '18/03/2026', status: 'confirmed', amount: 2500000 },
            { id: '#BK-002', customer: 'Trần Thị B', email: 'b@gmail.com', phone: '0902...', room: 'Standard', checkin: '16/03/2026', checkout: '17/03/2026', status: 'pending', amount: 1200000 },
            { id: '#BK-003', customer: 'Lê Văn C', email: 'c@gmail.com', phone: '0903...', room: 'Suite', checkin: '14/03/2026', checkout: '16/03/2026', status: 'completed', amount: 3800000 },
        ];
        
        function loadBookings() { /* Load and display bookings */ }
        function filterBookings() { /* Filter logic */ }
        function openBookingModal() { document.getElementById('bookingModal').classList.add('flex'); }
        function closeBookingModal() { document.getElementById('bookingModal').classList.remove('flex'); }
        function saveBooking() { alert('Đã lưu đặt phòng!'); closeBookingModal(); }
        
        loadBookings();
    </script>
</body>
</html>
