<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nhân viên - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <div class="flex justify-between items-center">
            <div><h1 class="text-2xl font-bold text-gray-800">Quản lý nhân viên</h1><p class="text-sm text-gray-500">Quản lý thông tin nhân viên</p></div>
            <button class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus mr-2"></i>Thêm nhân viên</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border text-center"><div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto"><i class="fas fa-user-tie text-3xl text-emerald-600"></i></div><h3 class="font-bold mt-3">Nguyễn Văn Quản Lý</h3><p class="text-sm text-gray-500">Quản lý</p><span class="inline-block px-2 py-1 bg-green-100 text-green-600 text-xs rounded-full mt-2">Đang làm việc</span></div>
        </div>
    </div>
</body>
</html>
