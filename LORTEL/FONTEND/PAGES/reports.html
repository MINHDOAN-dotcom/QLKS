<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <h1 class="text-2xl font-bold text-gray-800">Báo cáo & Thống kê</h1>
        
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <select class="border rounded-lg px-3 py-2 text-sm"><option>Báo cáo doanh thu</option><option>Báo cáo đặt phòng</option></select>
                <select class="border rounded-lg px-3 py-2 text-sm"><option>Tuần này</option><option>Tháng này</option><option>Năm nay</option></select>
                <button class="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm">Tạo báo cáo</button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm"><canvas id="monthlyChart" height="200"></canvas></div>
            <div class="bg-white p-5 rounded-xl shadow-sm"><canvas id="statusChart" height="200"></canvas></div>
        </div>
    </div>
    
    <script>
        new Chart(document.getElementById('monthlyChart'), { type: 'bar', data: { labels: ['T1','T2','T3'], datasets: [{ label: 'Doanh thu (triệu)', data: [850,920,1100], backgroundColor: '#10b981' }] } });
        new Chart(document.getElementById('statusChart'), { type: 'doughnut', data: { labels: ['Đã xác nhận','Chờ','Đã hủy'], datasets: [{ data: [45,25,15], backgroundColor: ['#10b981','#f59e0b','#ef4444'] }] } });
    </script>
</body>
</html>
