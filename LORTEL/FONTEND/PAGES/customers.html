<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <div class="flex justify-between items-center">
            <div><h1 class="text-2xl font-bold text-gray-800">Quản lý khách hàng</h1><p class="text-sm text-gray-500">Quản lý thông tin khách hàng</p></div>
            <button class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus mr-2"></i>Thêm khách hàng</button>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" placeholder="Tìm kiếm khách hàng..." class="border rounded-lg px-4 py-2 text-sm">
                <select class="border rounded-lg px-4 py-2 text-sm"><option>Sắp xếp theo</option><option>Tên A-Z</option><option>Chi tiêu cao nhất</option></select>
                <button class="bg-gray-100 px-4 py-2 rounded-lg text-sm">Tìm kiếm</button>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left">Khách hàng</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Điện thoại</th><th class="px-6 py-3 text-left">Tổng đặt</th><th class="px-6 py-3 text-right">Chi tiêu</th></tr></thead>
                <tbody class="divide-y">
                    <tr><td class="px-6 py-3"><div class="flex items-center gap-2"><div class="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center">NA</div><span>Nguyễn Văn A</span></div></td><td>a@gmail.com</td><td>0901 234 567</td><td>5</td><td class="text-right">12.500.000đ</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
