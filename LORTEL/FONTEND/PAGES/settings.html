<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <h1 class="text-2xl font-bold text-gray-800">Cài đặt hệ thống</h1>
        
        <div class="bg-white rounded-xl shadow-sm border p-6">
            <div class="border-b flex gap-6 mb-6">
                <button class="py-2 border-b-2 border-emerald-600 font-medium">Thông tin chung</button>
                <button class="py-2 text-gray-500">Bảo mật</button>
                <button class="py-2 text-gray-500">Thông báo</button>
            </div>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium mb-2">Tên khách sạn</label><input type="text" value="LORTEL" class="w-full border rounded-lg px-4 py-2"></div>
                    <div><label class="block text-sm font-medium mb-2">Email liên hệ</label><input type="email" value="info@lortel.com" class="w-full border rounded-lg px-4 py-2"></div>
                    <div><label class="block text-sm font-medium mb-2">Số điện thoại</label><input type="text" value="1900 1234" class="w-full border rounded-lg px-4 py-2"></div>
                    <div><label class="block text-sm font-medium mb-2">Địa chỉ</label><input type="text" value="123 Lê Thánh Tôn, Quận 1" class="w-full border rounded-lg px-4 py-2"></div>
                </div>
                <div class="pt-4 flex justify-end gap-3"><button class="px-6 py-2 border rounded-lg">Đặt lại</button><button class="px-6 py-2 bg-emerald-600 text-white rounded-lg">Lưu thay đổi</button></div>
            </div>
        </div>
    </div>
</body>
</html>
