<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý phòng - LORTEL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="p-6 space-y-6">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Quản lý phòng</h1>
                <p class="text-sm text-gray-500 mt-1">Quản lý tất cả phòng trong khách sạn</p>
            </div>
            <button class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-emerald-700" onclick="openRoomModal()">
                <i class="fas fa-plus mr-2"></i>Thêm phòng mới
            </button>
        </div>
        
        <!-- Room Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-lg shadow-sm"><p class="text-sm text-gray-500">Tổng số phòng</p><p class="text-2xl font-bold">156</p></div>
            <div class="bg-white p-4 rounded-lg shadow-sm"><p class="text-sm text-gray-500">Đang có khách</p><p class="text-2xl font-bold text-green-600">114</p></div>
            <div class="bg-white p-4 rounded-lg shadow-sm"><p class="text-sm text-gray-500">Phòng trống</p><p class="text-2xl font-bold text-blue-600">42</p></div>
            <div class="bg-white p-4 rounded-lg shadow-sm"><p class="text-sm text-gray-500">Đang bảo trì</p><p class="text-2xl font-bold text-yellow-600">8</p></div>
        </div>
        
        <!-- Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input type="text" id="searchRoom" placeholder="Tìm kiếm phòng..." class="border rounded-lg px-4 py-2 text-sm">
                <select id="roomTypeFilter" class="border rounded-lg px-4 py-2 text-sm"><option value="all">Tất cả loại</option><option>Standard</option><option>Deluxe</option><option>Suite</option></select>
                <select id="roomStatusFilter" class="border rounded-lg px-4 py-2 text-sm"><option value="all">Tất cả trạng thái</option><option>available">Phòng trống</option><option>occupied">Đang có khách</option></select>
                <button onclick="filterRooms()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm">Tìm kiếm</button>
            </div>
        </div>
        
        <!-- Room Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="roomsGrid">
            <!-- Room cards -->
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <img src="https://picsum.photos/id/164/400/200" class="w-full h-48 object-cover">
                <div class="p-4">
                    <div class="flex justify-between"><h3 class="font-bold">Deluxe City View</h3><span class="text-emerald-600 font-bold">1.200.000đ</span></div>
                    <p class="text-sm text-gray-500">Phòng 501 | Tầng 5</p>
                    <div class="flex gap-1 mt-2"><span class="bg-gray-100 text-xs px-2 py-1 rounded">WiFi</span><span class="bg-gray-100 text-xs px-2 py-1 rounded">TV</span></div>
                    <div class="flex justify-between mt-3 pt-3 border-t"><button class="text-blue-600"><i class="fas fa-edit"></i> Sửa</button><button class="text-red-600"><i class="fas fa-trash"></i> Xóa</button></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function openRoomModal() { alert('Mở form thêm phòng'); }
        function filterRooms() { /* Filter logic */ }
    </script>
</body>
</html>
